services:
 app:
  image: python:3.12-alpine

  working_dir: /app

  command:
   - python
   - -m
   - http.server
   - "8000"
  
  volumes:
   - ./app:/app:ro

 web:
  image: nginx:alpine

  ports:
   - "8084:80"

  volumes:
   - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  depends_on:
   - app
