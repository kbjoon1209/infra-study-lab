
services:
  db:
    image: mysql:8.4

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

    volumes:
      - db_data:/var/lib/mysql

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"
        ]

      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  app:
    build:
      context: ./app

    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}

    depends_on:
      db:
        condition: service_healthy

    healthcheck:
      # App Container 내부에서 /health 요청
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health')"
        ]

      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  web:
    # Nginx Reverse Proxy
    image: nginx:alpine

    ports:
      # Host TCP 8087
      # ↓
      # Nginx Container TCP 80
      - "8087:80"

    volumes:
      # Host Nginx Config
      # ↓
      # Container default.conf
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      app:
        # App Healthcheck 성공 후 Web 시작
        condition: service_healthy

volumes:
  db_data: